```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz CSV App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(120deg,#1f4037,#99f2c8);
margin:0;
padding:10px;
}

.container{
background:white;
max-width:1100px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

input[type=file]{
font-size:16px;
padding:8px;
margin-bottom:10px;
}

.timer{
font-size:18px;
color:red;
font-weight:bold;
margin-bottom:10px;
}

.layout{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.palette{
width:200px;
display:flex;
flex-wrap:wrap;
gap:6px;
}

.qbox{
width:36px;
height:36px;
background:#ccc;
display:flex;
align-items:center;
justify-content:center;
border-radius:5px;
cursor:pointer;
}

.answered{
background:#4CAF50;
color:white;
}

.current{
border:3px solid black;
}

.question-area{
flex:1;
min-width:250px;
}

.option{
background:#f3f3f3;
padding:12px;
margin:8px 0;
border-radius:6px;
cursor:pointer;
}

.option:hover{
background:#e0e0e0;
}

.buttons{
margin-top:10px;
display:flex;
flex-wrap:wrap;
gap:10px;
}

button{
padding:10px 15px;
border:none;
background:#1976d2;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}

@media(max-width:700px){

.layout{
flex-direction:column;
}

.palette{
width:100%;
justify-content:center;
}

}

</style>
</head>

<body>

<div class="container">

<h2>Upload Quiz CSV</h2>

<input type="file" id="csvFile">

<br>

<button onclick="loadQuiz()">Start Quiz</button>

<div id="quizArea" style="display:none">

<div class="timer" id="timer"></div>

<div class="layout">

<div class="palette" id="palette"></div>

<div class="question-area">

<h3 id="question"></h3>

<div id="options"></div>

<div class="buttons">

<button onclick="prevQuestion()">Previous</button>
<button onclick="nextQuestion()">Next</button>
<button onclick="submitQuiz()">Submit</button>

</div>

</div>

</div>

</div>

<div id="result"></div>

</div>

<script>

let quizData=[]
let currentQuestion=0
let answers=[]
let timer
let timeLeft=0

function loadQuiz(){

quizData=[]
answers=[]

let file=document.getElementById("csvFile").files[0]

if(!file){
alert("Please upload CSV file")
return
}

let reader=new FileReader()

reader.onload=function(e){

let lines=e.target.result.trim().split(/\r?\n/)

for(let i=1;i<lines.length;i++){

let d=lines[i].split(",")

if(d.length>=6){

quizData.push({
q:d[0],
o:[d[1],d[2],d[3],d[4]],
a:d[5].trim()
})

}

}

if(quizData.length===0){
alert("CSV format incorrect")
return
}

startQuiz()

}

reader.readAsText(file)

}

function startQuiz(){

document.getElementById("quizArea").style.display="block"

timeLeft=quizData.length*60

createPalette()

startTimer()

showQuestion()

}

function startTimer(){

timer=setInterval(()=>{

timeLeft--

let m=Math.floor(timeLeft/60)
let s=timeLeft%60

if(s<10) s="0"+s

document.getElementById("timer").innerHTML="Time: "+m+":"+s

if(timeLeft<=0){
clearInterval(timer)
showResult()
}

},1000)

}

function createPalette(){

let html=""

for(let i=0;i<quizData.length;i++){

html+=`<div class="qbox" id="box${i}" onclick="gotoQ(${i})">${i+1}</div>`

}

document.getElementById("palette").innerHTML=html

}

function showQuestion(){

let q=quizData[currentQuestion]

document.getElementById("question").innerHTML="Q"+(currentQuestion+1)+": "+q.q

let html=""

q.o.forEach(opt=>{

let checked=answers[currentQuestion]===opt?"checked":""

html+=`
<div class="option" onclick="selectOption('${opt}')">
<input type="radio" name="opt" ${checked}>
${opt}
</div>
`

})

document.getElementById("options").innerHTML=html

updatePalette()

}

function selectOption(opt){

answers[currentQuestion]=opt

showQuestion()

}

function nextQuestion(){

if(currentQuestion<quizData.length-1){
currentQuestion++
showQuestion()
}

}

function prevQuestion(){

if(currentQuestion>0){
currentQuestion--
showQuestion()
}

}

function gotoQ(i){

currentQuestion=i
showQuestion()

}

function updatePalette(){

for(let i=0;i<quizData.length;i++){

let b=document.getElementById("box"+i)

b.classList.remove("answered","current")

if(answers[i]) b.classList.add("answered")

if(i===currentQuestion) b.classList.add("current")

}

}

function submitQuiz(){

clearInterval(timer)

showResult()

}

function showResult(){

document.getElementById("quizArea").style.display="none"

let correct=0

quizData.forEach((q,i)=>{
if(answers[i]===q.a) correct++
})

let wrong=(answers.filter(a=>a).length)-correct

let percent=Math.round((correct/quizData.length)*100)

let html=`

<h2>Result</h2>

<p>Total Questions: ${quizData.length}</p>

<p>Correct: ${correct}</p>

<p>Wrong: ${wrong}</p>

<p>Score: ${percent}%</p>

`

document.getElementById("result").innerHTML=html

}

</script>

</body>
</html>
