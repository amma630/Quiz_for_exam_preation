```html
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSV Quiz System</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

.option{
display:block;
background:#eee;
padding:10px;
margin:8px 0;
cursor:pointer;
border-radius:5px;
}

.option:hover{
background:#ddd;
}

button{
padding:10px 15px;
margin-top:10px;
margin-right:5px;
}

.correct{color:green;font-weight:bold;}
.wrong{color:red;font-weight:bold;}

</style>

</head>

<body>

<div class="container">

<h2>Upload Quiz CSV</h2>

<input type="file" id="csvFile">
<button onclick="loadQuiz()">Start Quiz</button>

<div id="quizArea" style="display:none">

<h3 id="question"></h3>

<div id="options"></div>

<button onclick="prev()">Previous</button>
<button onclick="next()">Next</button>
<button onclick="submitQuiz()">Submit</button>

</div>

<div id="result"></div>

</div>

<script>

let quizData=[]
let current=0
let answers=[]

function loadQuiz(){

let file=document.getElementById("csvFile").files[0]

if(!file){
alert("Please upload CSV")
return
}

Papa.parse(file,{
header:true,
skipEmptyLines:true,

complete:function(results){

quizData = results.data

document.getElementById("quizArea").style.display="block"

showQuestion()

}

})

}

function showQuestion(){

let q=quizData[current]

document.getElementById("question").innerHTML="Q"+(current+1)+": "+q.Question

let options=[q.Option1,q.Option2,q.Option3,q.Option4]

let html=""

options.forEach(opt=>{

let checked=answers[current]==opt?"checked":""

html+=`
<label class="option">
<input type="radio" name="opt" value="${opt}" ${checked} onclick="save()">
${opt}
</label>
`

})

document.getElementById("options").innerHTML=html

}

function save(){

let s=document.querySelector('input[name="opt"]:checked')

if(s){
answers[current]=s.value
}

}

function next(){

save()

if(current<quizData.length-1){
current++
showQuestion()
}

}

function prev(){

save()

if(current>0){
current--
showQuestion()
}

}

function submitQuiz(){

save()

let correct=0

quizData.forEach((q,i)=>{
if(answers[i]==q.Answer) correct++
})

let html="<h2>Result</h2>"
html+="Correct: "+correct+" / "+quizData.length+"<br><br>"

quizData.forEach((q,i)=>{

html+="<hr>"
html+="<b>Q"+(i+1)+": "+q.Question+"</b><br>"
html+="Your Answer: "+(answers[i]||"Not answered")+"<br>"
html+="Correct Answer: "+q.Answer+"<br>"
html+="Explanation: "+q.Explanation+"<br>"

})

document.getElementById("quizArea").style.display="none"

document.getElementById("result").innerHTML=html

}

</script>

</body>
</html>
