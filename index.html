<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GATE Practice Pro</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --dark: #212529; }
        * { box-sizing: border-box; font-family: sans-serif; }
        body { margin: 0; padding: 15px; background: #f0f2f5; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 500px; padding: 20px; border-radius: 15px; shadow: 0 4px 12px rgba(0,0,0,0.1); }
        
        /* Mobile File Input Styling */
        .file-upload-wrapper {
            border: 2px dashed #ccc;
            padding: 30px;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 20px;
            position: relative;
        }
        input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            opacity: 0;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .q-box { display: none; }
        .option {
            display: block;
            background: #f8f9fa;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
        }
        .option:active { background: #e2e6ea; }
        
        .palette { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; }
        .dot { width: 30px; height: 30px; background: #ddd; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .dot.active { border: 2px solid black; }
        .dot.done { background: var(--success); color: white; }
    </style>
</head>
<body>

<div class="card">
    <div id="step1">
        <h2>GATE Quiz</h2>
        <div class="file-upload-wrapper">
            <p id="fileName">Tap to Select CSV</p>
            <input type="file" id="csvPicker" accept=".csv, text/plain">
        </div>
        <button class="btn" onclick="processFile()">Start Exam</button>
        <p style="font-size: 12px; color: #666;">Note: Use a CSV with format:<br>Question, Opt1, Opt2, Opt3, Opt4, Answer</p>
    </div>

    <div id="step2" class="q-box">
        <div id="palette" class="palette"></div>
        <h3 id="questionText"></h3>
        <div id="optionsGroup"></div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="btn" style="background:#6c757d" onclick="nav(-1)">Prev</button>
            <button class="btn" onclick="nav(1)">Next</button>
        </div>
        <button class="btn" style="background:var(--dark)" onclick="showResult()">Submit</button>
    </div>

    <div id="step3" class="q-box">
        <h2>Exam Summary</h2>
        <h1 id="finalScore">0/0</h1>
        <button class="btn" onclick="location.reload()">Restart</button>
    </div>
</div>

<script>
    let questions = [], current = 0, answers = [];

    // Visual feedback when file is picked
    document.getElementById('csvPicker').onchange = function(e) {
        if(e.target.files[0]) document.getElementById('fileName').innerText = "✅ " + e.target.files[0].name;
    };

    function processFile() {
        const file = document.getElementById('csvPicker').files[0];
        if (!file) return alert("Select a file first");

        const reader = new FileReader();
        reader.onload = function(e) {
            const rows = e.target.result.split(/\r?\n/).filter(line => line.trim() !== "");
            // Standardizing the split to handle Samsung/Android comma separation
            questions = rows.slice(1).map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); // Handles commas inside quotes
                return { 
                    q: cols[0].replace(/"/g, ""), 
                    o: [cols[1], cols[2], cols[3], cols[4]].map(o => o?.replace(/"/g, "")), 
                    a: cols[5]?.trim().replace(/"/g, "") 
                };
            });

            if(questions.length > 0) startQuiz();
            else alert("Could not read questions. Check CSV format.");
        };
        reader.readAsText(file);
    }

    function startQuiz() {
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
        render();
    }

    function render() {
        // Palette
        const pal = document.getElementById('palette');
        pal.innerHTML = questions.map((_, i) => `<div class="dot ${i===current?'active':''} ${answers[i]?'done':''}">${i+1}</div>`).join('');
        
        // Question
        const q = questions[current];
        document.getElementById('questionText').innerText = q.q;
        document.getElementById('optionsGroup').innerHTML = q.o.map(opt => `
            <label class="option">
                <input type="radio" name="choice" value="${opt}" ${answers[current]===opt?'checked':''} onchange="setAns('${opt}')"> ${opt}
            </label>
        `).join('');
    }

    function setAns(val) {
        answers[current] = val;
        render();
    }

    function nav(dir) {
        if(current + dir >= 0 && current + dir < questions.length) {
            current += dir;
            render();
        }
    }

    function showResult() {
        let score = 0;
        questions.forEach((q, i) => { if(answers[i] === q.a) score++; });
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'block';
        document.getElementById('finalScore').innerText = `${score} / ${questions.length}`;
    }
</script>
</body>
</html>
