
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSV Quiz App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<!-- CSV Parser -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(120deg,#1f4037,#99f2c8);
margin:0;
padding:20px;
}

.container{
background:white;
max-width:900px;
margin:auto;
padding:25px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

button{
background:#1976d2;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.option{
display:block;
background:#f1f1f1;
padding:10px;
margin:8px 0;
border-radius:6px;
cursor:pointer;
}

.timer{
color:red;
font-weight:bold;
margin-bottom:10px;
}

.palette{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:15px;
}

.qbox{
width:35px;
height:35px;
display:flex;
align-items:center;
justify-content:center;
background:#ccc;
border-radius:5px;
cursor:pointer;
font-size:14px;
}

.answered{background:#4CAF50;color:white;}
.current{border:3px solid black;}

</style>
</head>

<body>

<div class="container">

<h2>Upload Quiz CSV</h2>

<input type="file" id="csvFile">
<br>
<button onclick="loadQuiz()">Start Quiz</button>

<div id="quizArea" style="display:none">

<div class="timer" id="timer"></div>

<div class="palette" id="palette"></div>

<h3 id="question"></h3>

<div id="options"></div>

<button onclick="prevQ()">Previous</button>
<button onclick="nextQ()">Next</button>
<button onclick="submitQuiz()">Submit</button>

</div>

<div id="result"></div>

</div>

<script>

let quizData=[]
let answers=[]
let current=0
let timer
let timeLeft

function loadQuiz(){

let file=document.getElementById("csvFile").files[0]

if(!file){
alert("Please upload CSV file")
return
}

Papa.parse(file,{
header:true,
skipEmptyLines:true,

complete:function(results){

quizData=[]

results.data.forEach(row=>{

quizData.push({
q:row.Question,
o:[row.Option1,row.Option2,row.Option3,row.Option4],
a:row.Answer,
exp:row.Explanation
})

})

if(quizData.length==0){
alert("CSV format incorrect")
return
}

startQuiz()

}

})

}

function startQuiz(){

document.getElementById("quizArea").style.display="block"

timeLeft=quizData.length*60

createPalette()

startTimer()

showQuestion()

}

function startTimer(){

timer=setInterval(()=>{

timeLeft--

let m=Math.floor(timeLeft/60)
let s=timeLeft%60

if(s<10) s="0"+s

document.getElementById("timer").innerHTML="Time: "+m+":"+s

if(timeLeft<=0){
clearInterval(timer)
showResult()
}

},1000)

}

function createPalette(){

let html=""

for(let i=0;i<quizData.length;i++){
html+=`<div class="qbox" id="box${i}" onclick="gotoQ(${i})">${i+1}</div>`
}

document.getElementById("palette").innerHTML=html

}

function showQuestion(){

let q=quizData[current]

document.getElementById("question").innerHTML="Q"+(current+1)+": "+q.q

let html=""

q.o.forEach(opt=>{

let checked=answers[current]==opt?"checked":""

html+=`
<label class="option">
<input type="radio" name="opt" value="${opt}" ${checked} onclick="saveAnswer()">
${opt}
</label>
`

})

document.getElementById("options").innerHTML=html

updatePalette()

}

function saveAnswer(){

let s=document.querySelector('input[name="opt"]:checked')

if(s) answers[current]=s.value

}

function nextQ(){

saveAnswer()

if(current<quizData.length-1){
current++
showQuestion()
}

}

function prevQ(){

saveAnswer()

if(current>0){
current--
showQuestion()
}

}

function gotoQ(i){

saveAnswer()
current=i
showQuestion()

}

function updatePalette(){

for(let i=0;i<quizData.length;i++){

let b=document.getElementById("box"+i)

b.classList.remove("answered","current")

if(answers[i]) b.classList.add("answered")

if(i==current) b.classList.add("current")

}

}

function submitQuiz(){

saveAnswer()
clearInterval(timer)
showResult()

}

function showResult(){

document.getElementById("quizArea").style.display="none"

let correct=0

quizData.forEach((q,i)=>{
if(answers[i]==q.a) correct++
})

let html="<h2>Result</h2>"
html+="Score: "+correct+" / "+quizData.length+"<br><br>"

quizData.forEach((q,i)=>{

html+="<hr>"
html+="<b>"+q.q+"</b><br>"
html+="Your Answer: "+(answers[i]||"Not Answered")+"<br>"
html+="Correct: "+q.a+"<br>"
html+="Explanation: "+q.exp+"<br>"

})

document.getElementById("result").innerHTML=html

}

</script>

</body>
</html>
