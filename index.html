<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GATE Practice Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1976d2; --success: #4CAF50; --error: #e53935; --warning: #ff9800; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(120deg, #1f4037, #99f2c8); margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; }
        .container { background: white; width: 100%; max-width: 850px; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); box-sizing: border-box; }
        .timer { font-size: 20px; color: red; font-weight: bold; text-align: right; margin-bottom: 15px; }
        .layout { display: flex; flex-direction: column; gap: 20px; }
        @media (min-width: 768px) { .layout { flex-direction: row-reverse; } .palette { width: 220px; } }
        .palette { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 8px; background: #f9f9f9; padding: 10px; border-radius: 8px; max-height: 300px; overflow-y: auto; }
        .qbox { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; background: #ccc; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .answered { background: var(--success) !important; color: white; }
        .review { background: var(--warning) !important; color: white; }
        .current { border: 3px solid #000; box-shadow: 0 0 8px rgba(0,0,0,0.2); }
        .correct { background: var(--success); color: white; }
        .wrong { background: var(--error); color: white; }
        .question-area { flex: 1; }
        .option { display: block; background: #f3f3f3; padding: 15px; margin: 10px 0; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .option:active { background: #e0e0e0; }
        .buttons { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-submit { background: #333; grid-column: span 2; margin-top: 10px; }
        .card { background: #f4f4f4; padding: 10px; border-radius: 8px; text-align: center; flex: 1; font-size: 14px; }
        .summary { display: flex; gap: 10px; margin-bottom: 20px; }
        .explanation { margin-top: 15px; background: #f7f7f7; padding: 15px; border-radius: 10px; border-left: 5px solid var(--primary); }
    </style>
</head>
<body>
<div class="container">
    <div id="uploadArea">
        <h2>GATE Quiz Upload</h2>
        <input type="file" id="csvFile" accept=".csv" style="width:100%; margin-bottom:20px;">
        <button onclick="loadQuiz()" style="width:100%">Start Quiz</button>
    </div>

    <div id="quizArea" style="display:none">
        <div class="timer" id="timer">00:00</div>
        <div class="layout">
            <div class="palette" id="palette"></div>
            <div class="question-area">
                <h3 id="question"></h3>
                <div id="options"></div>
                <div class="buttons">
                    <button onclick="prevQuestion()">Previous</button>
                    <button onclick="nextQuestion()">Next</button>
                    <button onclick="markReview()" style="background:var(--warning)">Mark Review</button>
                    <button onclick="submitQuiz()" class="btn-submit">Finish & Submit</button>
                </div>
            </div>
        </div>
    </div>
    <div id="result"></div>
</div>

<script>
    let quizData = [], currentQuestion = 0, answers = [], review = [], timer, timeLeft = 0;

    function loadQuiz() {
        const file = document.getElementById("csvFile").files[0];
        if (!file) return alert("Upload CSV");
        const reader = new FileReader();
        reader.onload = (e) => {
            const lines = e.target.result.split(/\r?\n/);
            lines.slice(1).forEach(line => {
                const d = line.split(",");
                if (d.length >= 6) quizData.push({ q: d[0], o: [d[1], d[2], d[3], d[4]], a: d[5].trim() });
            });
            if (quizData.length) startQuiz();
        };
        reader.readAsText(file);
    }

    function startQuiz() {
        document.getElementById("uploadArea").style.display = "none";
        document.getElementById("quizArea").style.display = "block";
        timeLeft = quizData.length * 60;
        createPalette();
        showQuestion();
        timer = setInterval(() => {
            timeLeft--;
            const m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById("timer").innerText = `Time: ${m}:${s<10?'0'+s:s}`;
            if(timeLeft<=0) submitQuiz();
        }, 1000);
    }

    function createPalette() {
        document.getElementById("palette").innerHTML = quizData.map((_, i) => 
            `<div class="qbox" id="box${i}" onclick="gotoQ(${i})">${i+1}</div>`).join('');
    }

    function showQuestion() {
        const q = quizData[currentQuestion];
        document.getElementById("question").innerText = `Q${currentQuestion+1}: ${q.q}`;
        document.getElementById("options").innerHTML = q.o.map(opt => `
            <label class="option">
                <input type="radio" name="opt" value="${opt}" ${answers[currentQuestion]===opt?'checked':''} onchange="saveAnswer()"> ${opt}
            </label>`).join('');
        updatePalette();
    }

    function saveAnswer() {
        const s = document.querySelector('input[name="opt"]:checked');
        if (s) { answers[currentQuestion] = s.value; updatePalette(); }
    }

    function nextQuestion() { if(currentQuestion < quizData.length-1) { currentQuestion++; showQuestion(); } }
    function prevQuestion() { if(currentQuestion > 0) { currentQuestion--; showQuestion(); } }
    function markReview() { review[currentQuestion] = !review[currentQuestion]; updatePalette(); }
    function gotoQ(i) { currentQuestion = i; showQuestion(); }

    function updatePalette() {
        quizData.forEach((_, i) => {
            const b = document.getElementById(`box${i}`);
            b.className = `qbox ${answers[i]?'answered':''} ${review[i]?'review':''} ${i===currentQuestion?'current':''}`;
        });
    }

    function submitQuiz() {
        clearInterval(timer);
        document.getElementById("quizArea").style.display = "none";
        let score = 0;
        quizData.forEach((q, i) => { if(answers[i] === q.a) score++; });
        document.getElementById("result").innerHTML = `
            <h2>Result: ${score}/${quizData.length}</h2>
            <div class="summary">
                <div class="card">Correct: ${score}</div>
                <div class="card">Wrong: ${answers.filter(a=>a).length - score}</div>
            </div>
            <button onclick="location.reload()" style="width:100%">Restart</button>
        `;
    }
</script>
</body>
</html>
