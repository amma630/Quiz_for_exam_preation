
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GATE Practice Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(120deg,#1f4037,#99f2c8);
margin:0;
padding:20px;
}

.container{
background:white;
max-width:1100px;
margin:auto;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.layout{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.palette{
width:220px;
display:flex;
flex-wrap:wrap;
gap:8px;
}

.qbox{
width:40px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
background:#ccc;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.answered{background:#4CAF50;color:white;}
.review{background:#ff9800;color:white;}
.current{border:3px solid black;}

.question-area{
flex:1;
min-width:250px;
}

.option{
display:block;
background:#f3f3f3;
padding:12px;
margin:10px 0;
border-radius:6px;
cursor:pointer;
}

.option:hover{
background:#e0e0e0;
}

.buttons{
margin-top:10px;
display:flex;
flex-wrap:wrap;
gap:10px;
}

button{
background:#1976d2;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
}

.timer{
font-size:18px;
color:red;
font-weight:bold;
margin-bottom:10px;
}

@media(max-width:768px){

.layout{
flex-direction:column;
}

.palette{
width:100%;
justify-content:center;
}

}

</style>
</head>

<body>

<div class="container">

<h2>Upload Quiz CSV</h2>

<input type="file" id="csvFile">
<button onclick="loadQuiz()">Start Quiz</button>

<div id="quizArea" style="display:none">

<div class="timer" id="timer"></div>

<div class="layout">

<div class="palette" id="palette"></div>

<div class="question-area">

<h3 id="question"></h3>

<div id="options"></div>

<div class="buttons">

<button onclick="prevQuestion()">Previous</button>
<button onclick="markReview()">Mark Review</button>
<button onclick="nextQuestion()">Next</button>
<button onclick="submitQuiz()">Submit</button>

</div>

</div>

</div>

</div>

<div id="result"></div>

</div>

<script>

let quizData=[]
let currentQuestion=0
let answers=[]
let review=[]
let timer
let timeLeft=0

function loadQuiz(){

quizData=[]
answers=[]
review=[]

let file=document.getElementById("csvFile").files[0]

if(!file){
alert("Upload CSV file")
return
}

let reader=new FileReader()

reader.onload=function(e){

let lines=e.target.result.trim().split(/\r?\n/)

for(let i=1;i<lines.length;i++){

let d=lines[i].split(",")

if(d.length>=7){

quizData.push({
q:d[0],
o:[d[1],d[2],d[3],d[4]],
a:d[5].trim(),
exp:d[6]
})

}

}

if(quizData.length==0){
alert("CSV not parsed correctly")
return
}

startQuiz()

}

reader.readAsText(file)

}

function startQuiz(){

document.getElementById("quizArea").style.display="block"

timeLeft=quizData.length*60

createPalette()

startTimer()

showQuestion()

}

function startTimer(){

timer=setInterval(()=>{

timeLeft--

let m=Math.floor(timeLeft/60)
let s=timeLeft%60

if(s<10) s="0"+s

document.getElementById("timer").innerHTML="Time: "+m+":"+s

if(timeLeft<=0){
clearInterval(timer)
showResult()
}

},1000)

}

function createPalette(){

let html=""

for(let i=0;i<quizData.length;i++){
html+=`<div class="qbox" id="box${i}" onclick="gotoQ(${i})">${i+1}</div>`
}

document.getElementById("palette").innerHTML=html

}

function showQuestion(){

let q=quizData[currentQuestion]

document.getElementById("question").innerHTML="Q"+(currentQuestion+1)+": "+q.q

let html=""

q.o.forEach(opt=>{

let checked=answers[currentQuestion]==opt?"checked":""

html+=`
<label class="option">
<input type="radio" name="opt" value="${opt}" ${checked} onclick="saveAnswer()">
${opt}
</label>
`

})

document.getElementById("options").innerHTML=html

updatePalette()

}

function saveAnswer(){

let s=document.querySelector('input[name="opt"]:checked')

if(s){
answers[currentQuestion]=s.value
}

}

function nextQuestion(){

saveAnswer()

if(currentQuestion<quizData.length-1){
currentQuestion++
showQuestion()
}

}

function prevQuestion(){

saveAnswer()

if(currentQuestion>0){
currentQuestion--
showQuestion()
}

}

function markReview(){

review[currentQuestion]=true
updatePalette()

}

function gotoQ(i){

saveAnswer()
currentQuestion=i
showQuestion()

}

function updatePalette(){

for(let i=0;i<quizData.length;i++){

let b=document.getElementById("box"+i)

b.classList.remove("answered","review","current")

if(answers[i]) b.classList.add("answered")

if(review[i]) b.classList.add("review")

if(i===currentQuestion) b.classList.add("current")

}

}

function submitQuiz(){

saveAnswer()
clearInterval(timer)
showResult()

}

function showResult(){

document.getElementById("quizArea").style.display="none"

let correct=0

quizData.forEach((q,i)=>{
if(answers[i]===q.a) correct++
})

let html="<h2>Result</h2>"
html+="Correct: "+correct+" / "+quizData.length+"<br><br>"

quizData.forEach((q,i)=>{

html+="<hr>"
html+="<b>Q"+(i+1)+": "+q.q+"</b><br>"
html+="Your Answer: "+(answers[i]||"Not Answered")+"<br>"
html+="Correct Answer: "+q.a+"<br>"
html+="Explanation: "+q.exp+"<br>"

})

document.getElementById("result").innerHTML=html

}

</script>

</body>
</html>
