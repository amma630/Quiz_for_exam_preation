<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz App</title>

<style>

body{
font-family:Arial;
background:#e8f5e9;
margin:0;
padding:20px;
}

.container{
background:white;
max-width:900px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.timer{
font-size:18px;
color:red;
margin-bottom:10px;
}

.palette{
display:flex;
flex-wrap:wrap;
gap:5px;
margin-bottom:15px;
}

.qbox{
width:35px;
height:35px;
background:#ccc;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
border-radius:5px;
}

.answered{background:green;color:white}
.review{background:orange;color:white}
.current{border:3px solid black}

.option{
background:#f1f1f1;
padding:10px;
margin:8px 0;
border-radius:6px;
cursor:pointer;
display:block;
}

.buttons{
margin-top:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
padding:8px 14px;
border:none;
background:#1976d2;
color:white;
border-radius:5px;
cursor:pointer;
}

.summary{
display:flex;
gap:10px;
margin-top:20px;
flex-wrap:wrap;
}

.card{
background:#eee;
padding:15px;
flex:1;
text-align:center;
border-radius:6px;
}

.correct{background:green;color:white}
.wrong{background:red;color:white}

.explanation{
margin-top:20px;
background:#f7f7f7;
padding:15px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<h2>Upload Quiz CSV</h2>

<input type="file" id="csvFile" accept=".csv">

<button onclick="loadQuiz()">Start Quiz</button>

<div id="quizArea" style="display:none">

<div class="timer" id="timer"></div>

<div class="palette" id="palette"></div>

<h3 id="question"></h3>

<div id="options"></div>

<div class="buttons">

<button onclick="prevQuestion()">Prev</button>
<button onclick="markReview()">Mark Review</button>
<button onclick="nextQuestion()">Next</button>
<button onclick="submitQuiz()">Submit</button>

</div>

</div>

<div id="result"></div>

</div>

<script>

let quizData=[]
let answers=[]
let review=[]
let currentQuestion=0
let timer
let timeLeft=0

function loadQuiz(){

quizData=[]
answers=[]
review=[]

let input=document.getElementById("csvFile")

if(input.files.length===0){
alert("Please upload CSV file")
return
}

let file=input.files[0]

let reader=new FileReader()

reader.onload=function(e){

let lines=e.target.result.trim().split(/\r?\n/)

for(let i=1;i<lines.length;i++){

let d=lines[i].split(",")

if(d.length>=6){

quizData.push({
q:d[0],
o:[d[1],d[2],d[3],d[4]],
a:d[5].trim(),
exp:d.slice(6).join(",")
})

}

}

if(quizData.length==0){
alert("CSV not loaded correctly")
return
}

startQuiz()

}

reader.readAsText(file)

}

function startQuiz(){

document.getElementById("quizArea").style.display="block"

timeLeft=quizData.length*60

createPalette()

startTimer()

showQuestion()

}

function startTimer(){

timer=setInterval(()=>{

timeLeft--

let m=Math.floor(timeLeft/60)
let s=timeLeft%60

if(s<10)s="0"+s

document.getElementById("timer").innerHTML="Time: "+m+":"+s

if(timeLeft<=0){
clearInterval(timer)
showResult()
}

},1000)

}

function createPalette(){

let html=""

for(let i=0;i<quizData.length;i++){
html+=`<div class="qbox" id="box${i}" onclick="gotoQ(${i})">${i+1}</div>`
}

document.getElementById("palette").innerHTML=html

}

function showQuestion(){

let q=quizData[currentQuestion]

document.getElementById("question").innerHTML="Q"+(currentQuestion+1)+": "+q.q

let html=""

q.o.forEach(opt=>{

let checked=answers[currentQuestion]==opt?"checked":""

html+=`
<label class="option">
<input type="radio" name="opt" value="${opt}" ${checked}>
${opt}
</label>
`

})

document.getElementById("options").innerHTML=html

updatePalette()

}

function saveAnswer(){

let s=document.querySelector('input[name="opt"]:checked')

if(s){
answers[currentQuestion]=s.value
}

}

function nextQuestion(){

saveAnswer()

if(currentQuestion<quizData.length-1){
currentQuestion++
showQuestion()
}

}

function prevQuestion(){

saveAnswer()

if(currentQuestion>0){
currentQuestion--
showQuestion()
}

}

function markReview(){

review[currentQuestion]=true
updatePalette()

}

function gotoQ(i){

saveAnswer()
currentQuestion=i
showQuestion()

}

function updatePalette(){

for(let i=0;i<quizData.length;i++){

let b=document.getElementById("box"+i)

b.classList.remove("answered","review","current")

if(answers[i])b.classList.add("answered")

if(review[i])b.classList.add("review")

if(i===currentQuestion)b.classList.add("current")

}

}

function submitQuiz(){

saveAnswer()
clearInterval(timer)
showResult()

}

function showResult(){

document.getElementById("quizArea").style.display="none"

let correct=0

quizData.forEach((q,i)=>{
if(answers[i]===q.a)correct++
})

let wrong=(answers.filter(a=>a).length)-correct

let html=`

<h2>Result</h2>

<div class="summary">

<div class="card">Total<br>${quizData.length}</div>
<div class="card">Correct<br>${correct}</div>
<div class="card">Wrong<br>${wrong}</div>

</div>

<h3>Review</h3>

<div class="palette">
`

quizData.forEach((q,i)=>{

let cls=answers[i]===q.a?"correct":"wrong"

html+=`<div class="qbox ${cls}" onclick="showExplanation(${i})">${i+1}</div>`

})

html+=`</div><div id="explanation"></div>`

document.getElementById("result").innerHTML=html

}

function showExplanation(i){

let q=quizData[i]

let html=`

<div class="explanation">

<b>Question:</b> ${q.q}<br><br>

<b>Your Answer:</b> ${answers[i] || "Not Answered"}<br>

<b>Correct Answer:</b> ${q.a}<br><br>

<b>Explanation:</b> ${q.exp || "No explanation"}

</div>
`

document.getElementById("explanation").innerHTML=html

}

</script>

</body>
</html>
