```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GATE Practice Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(120deg,#1f4037,#99f2c8);
margin:0;
padding:20px;
}

.container{
background:white;
max-width:1100px;
margin:auto;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.timer{
font-size:18px;
color:red;
font-weight:bold;
margin-bottom:10px;
}

.layout{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.palette{
width:220px;
display:flex;
flex-wrap:wrap;
gap:8px;
}

.qbox{
width:40px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
background:#ccc;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.answered{background:#4CAF50;color:white;}
.review{background:#ff9800;color:white;}
.current{border:3px solid black;}

.correct{background:#4CAF50;color:white;}
.wrong{background:#e53935;color:white;}

.question-area{
flex:1;
min-width:250px;
}

.option{
display:block;
background:#f3f3f3;
padding:12px;
margin:10px 0;
border-radius:6px;
cursor:pointer;
}

.option:hover{
background:#e0e0e0;
}

.buttons{
margin-top:10px;
display:flex;
flex-wrap:wrap;
gap:10px;
}

button{
background:#1976d2;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#0d47a1;
}

.summary{
display:flex;
flex-wrap:wrap;
gap:20px;
margin-top:15px;
}

.card{
background:#f4f4f4;
padding:15px;
border-radius:8px;
flex:1;
text-align:center;
font-weight:bold;
min-width:120px;
}

.progress-container{
width:100%;
background:#ddd;
height:25px;
border-radius:12px;
margin-top:15px;
overflow:hidden;
}

.progress-bar{
height:100%;
background:linear-gradient(90deg,#4CAF50,#00c853);
color:white;
text-align:center;
line-height:25px;
font-weight:bold;
}

.review-section{
display:flex;
flex-wrap:wrap;
gap:25px;
margin-top:25px;
}

.explanation{
flex:1;
background:#f7f7f7;
padding:20px;
border-radius:10px;
min-width:250px;
}

.correct-option{
color:green;
font-weight:bold;
}

.wrong-option{
color:red;
font-weight:bold;
}

/* MOBILE RESPONSIVE */

@media(max-width:768px){

.container{
padding:15px;
}

.layout{
flex-direction:column;
}

.palette{
width:100%;
justify-content:center;
}

.qbox{
width:35px;
height:35px;
font-size:14px;
}

.question-area{
width:100%;
}

button{
padding:8px 12px;
font-size:13px;
}

}

</style>
</head>

<body>

<div class="container">

<h2>Upload Quiz CSV</h2>

<input type="file" id="csvFile">
<button onclick="loadQuiz()">Start Quiz</button>

<div id="quizArea" style="display:none">

<div class="timer" id="timer"></div>

<div class="layout">

<div class="palette" id="palette"></div>

<div class="question-area">

<h3 id="question"></h3>

<div id="options"></div>

<div class="buttons">

<button onclick="prevQuestion()">Previous</button>
<button onclick="markReview()">Mark Review</button>
<button onclick="nextQuestion()">Next</button>
<button onclick="submitQuiz()">Submit</button>

</div>

</div>

</div>

</div>

<div id="result"></div>

</div>

<!-- KEEP YOUR SAME JAVASCRIPT BELOW -->

</body>
</html>
