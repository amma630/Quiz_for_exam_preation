<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GATE Quiz Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1976d2; --success: #2e7d32; --error: #d32f2f; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; }
        .container { background: white; width: 100%; max-width: 500px; padding: 20px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); align-self: flex-start; }
        
        /* Mobile Upload Styling */
        .upload-box { border: 2px dashed var(--primary); padding: 30px; text-align: center; border-radius: 12px; background: #e3f2fd; cursor: pointer; margin-bottom: 15px; }
        input[type="file"] { display: none; }
        textarea { width: 100%; height: 100px; margin-top: 10px; border-radius: 8px; border: 1px solid #ccc; padding: 10px; font-size: 12px; }

        /* Quiz UI */
        .timer { font-size: 22px; color: var(--error); font-weight: bold; text-align: center; margin-bottom: 10px; }
        .palette { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-bottom: 20px; max-height: 120px; overflow-y: auto; padding: 5px; background: #f8f9fa; border-radius: 8px; }
        .p-item { aspect-ratio: 1/1; background: #fff; border: 1px solid #ccc; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
        .p-item.active { border: 2px solid #000; transform: scale(1.1); }
        .p-item.done { background: var(--success); color: white; border: none; }
        
        .q-text { font-size: 17px; font-weight: 600; margin-bottom: 15px; line-height: 1.4; color: #333; }
        .option { display: block; background: #f1f3f5; padding: 16px; margin: 10px 0; border-radius: 10px; border: 1px solid #dee2e6; font-size: 15px; cursor: pointer; }
        .option:active { background: #e9ecef; border-color: var(--primary); }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; background: var(--primary); color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn-nav { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-sec { background: #6c757d; }
        .btn-finish { background: #212529; }

        .result-card { text-align: center; padding: 20px; }
        .expl-box { background: #fff9c4; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 5px solid #fbc02d; font-size: 14px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup">
        <h2 style="margin:0 0 10px 0">GATE Quiz Loader</h2>
        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <b id="fileStatus">📂 Tap to Upload CSV</b>
            <input type="file" id="fileInput" accept=".csv, text/csv, text/plain">
        </div>
        <p style="text-align:center; font-size:12px; color:#666;">-- OR PASTE CSV TEXT BELOW --</p>
        <textarea id="rawCsv" placeholder="Paste CSV rows here if upload doesn't work..."></textarea>
        <button class="btn" onclick="initQuiz()">Start Practice</button>
    </div>

    <div id="quiz" style="display:none">
        <div class="timer" id="timer">00:00</div>
        <div class="palette" id="palette"></div>
        <div class="q-text" id="qText"></div>
        <div id="optionsArea"></div>
        <div class="btn-nav">
            <button class="btn btn-sec" onclick="changeQ(-1)">Previous</button>
            <button class="btn btn-sec" onclick="changeQ(1)">Next</button>
        </div>
        <button class="btn btn-finish" onclick="endQuiz()">Submit Exam</button>
    </div>

    <div id="result" style="display:none" class="result-card">
        <h2>Exam Result</h2>
        <h1 id="scoreDisplay" style="color:var(--primary); font-size:48px; margin:10px 0;">0/0</h1>
        <div id="reviewArea"></div>
        <button class="btn" onclick="location.reload()">Try Again</button>
    </div>
</div>

<script>
    let questions = [], current = 0, userAns = [], timer;

    // Mobile file selection feedback
    document.getElementById('fileInput').onchange = function(e) {
        if(e.target.files[0]) document.getElementById('fileStatus').innerText = "✅ " + e.target.files[0].name;
    };

    function initQuiz() {
        const file = document.getElementById('fileInput').files[0];
        const rawText = document.getElementById('rawCsv').value.trim();

        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => parseData(e.target.result);
            reader.readAsText(file);
        } else if (rawText) {
            parseData(rawText);
        } else {
            alert("Please select a file or paste CSV text!");
        }
    }

    function parseData(text) {
        const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
        questions = lines.slice(1).map(row => {
            // Robust regex for commas and quotes
            const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if(c.length < 6) return null;
            return {
                q: c[0].replace(/"/g, "").trim(),
                o: [c[1], c[2], c[3], c[4]].map(o => o.replace(/"/g, "").trim()),
                a: c[5].replace(/"/g, "").trim(),
                e: c[6] ? c[6].replace(/"/g, "").trim() : "No explanation available."
            };
        }).filter(q => q !== null);

        if(questions.length > 0) start();
        else alert("CSV Format Error! Ensure 6 or 7 columns.");
    }

    function start() {
        document.getElementById('setup').style.display = 'none';
        document.getElementById('quiz').style.display = 'block';
        let time = questions.length * 60;
        render();
        timer = setInterval(() => {
            time--;
            let m = Math.floor(time/60), s = time%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0'+s:s}`;
            if(time <= 0) endQuiz();
        }, 1000);
    }

    function render() {
        const q = questions[current];
        document.getElementById('palette').innerHTML = questions.map((_, i) => 
            `<div class="p-item ${i===current?'active':''} ${userAns[i]?'done':''}" onclick="current=${i};render();">${i+1}</div>`
        ).join('');
        
        document.getElementById('qText').innerText = `${current+1}. ${q.q}`;
        document.getElementById('optionsArea').innerHTML = q.o.map(opt => `
            <label class="option">
                <input type="radio" name="choice" value="${opt}" ${userAns[current]===opt?'checked':''} onchange="save('${opt}')"> ${opt}
            </label>
        `).join('');
    }

    function save(val) { userAns[current] = val; render(); }
    function changeQ(dir) { if(current+dir >= 0 && current+dir < questions.length) { current += dir; render(); } }

    function endQuiz() {
        clearInterval(timer);
        let score = 0;
        questions.forEach((q, i) => { if(userAns[i] === q.a) score++; });
        document.getElementById('quiz').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('scoreDisplay').innerText = `${score} / ${questions.length}`;
        
        // Final Review
        document.getElementById('reviewArea').innerHTML = questions.map((q, i) => `
            <div class="expl-box">
                <b>Q${i+1}: ${q.q}</b><br>
                <span style="color:${userAns[i]===q.a?'green':'red'}">Your Answer: ${userAns[i] || 'Skipped'}</span><br>
                <span style="color:green">Correct: ${q.a}</span><br>
                <small><i>${q.e}</i></small>
            </div>
        `).join('');
    }
</script>
</body>
</html>
