<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CSV Quiz App</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

.container{
background:white;
max-width:900px;
margin:auto;
padding:20px;
border-radius:8px;
}

.option{
display:block;
background:#eee;
padding:10px;
margin:8px 0;
border-radius:5px;
cursor:pointer;
}

.palette{
display:flex;
flex-wrap:wrap;
gap:6px;
margin:10px 0;
}

.qbox{
width:35px;
height:35px;
background:#ccc;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
border-radius:4px;
}

.answered{
background:green;
color:white;
}

.current{
border:3px solid black;
}

</style>
</head>

<body>

<div class="container">

<h2>Upload Quiz CSV</h2>

<input type="file" id="csvFile">
<br><br>

<button onclick="loadQuiz()">Start Quiz</button>

<div id="quizArea" style="display:none">

<div id="palette" class="palette"></div>

<h3 id="question"></h3>

<div id="options"></div>

<br>

<button onclick="prev()">Previous</button>
<button onclick="next()">Next</button>
<button onclick="submitQuiz()">Submit</button>

</div>

<div id="result"></div>

</div>

<script>

let quiz=[]
let answers=[]
let current=0

function loadQuiz(){

let file=document.getElementById("csvFile").files[0]

if(!file){
alert("Please upload CSV file")
return
}

Papa.parse(file,{

skipEmptyLines:true,

complete:function(res){

let data=res.data

quiz=[]

for(let i=1;i<data.length;i++){

let row=data[i]

if(row.length>=7){

quiz.push({
q:row[0],
o:[row[1],row[2],row[3],row[4]],
a:row[5],
e:row[6]
})

}

}

if(quiz.length==0){
alert("CSV format incorrect")
return
}

startQuiz()

}

})

}

function startQuiz(){

document.getElementById("quizArea").style.display="block"

createPalette()

showQuestion()

}

function createPalette(){

let html=""

for(let i=0;i<quiz.length;i++){
html+=`<div class="qbox" id="b${i}" onclick="gotoQ(${i})">${i+1}</div>`
}

document.getElementById("palette").innerHTML=html

}

function showQuestion(){

let q=quiz[current]

document.getElementById("question").innerText=(current+1)+". "+q.q

let html=""

q.o.forEach(opt=>{

let checked=answers[current]==opt?"checked":""

html+=`
<label class="option">
<input type="radio" name="opt" value="${opt}" ${checked} onclick="save()">
${opt}
</label>
`

})

document.getElementById("options").innerHTML=html

updatePalette()

}

function save(){

let s=document.querySelector('input[name="opt"]:checked')

if(s) answers[current]=s.value

}

function next(){

save()

if(current<quiz.length-1){
current++
showQuestion()
}

}

function prev(){

save()

if(current>0){
current--
showQuestion()
}

}

function gotoQ(i){

save()

current=i

showQuestion()

}

function updatePalette(){

for(let i=0;i<quiz.length;i++){

let b=document.getElementById("b"+i)

b.classList.remove("answered","current")

if(answers[i]) b.classList.add("answered")

if(i==current) b.classList.add("current")

}

}

function submitQuiz(){

save()

let correct=0

quiz.forEach((q,i)=>{
if(answers[i]==q.a) correct++
})

let html="<h2>Result</h2>"
html+="Score: "+correct+" / "+quiz.length+"<br><br>"

quiz.forEach((q,i)=>{

html+="<hr>"
html+="<b>"+q.q+"</b><br>"
html+="Your Answer: "+(answers[i]||"Not answered")+"<br>"
html+="Correct Answer: "+q.a+"<br>"
html+="Explanation: "+q.e+"<br>"

})

document.getElementById("result").innerHTML=html

document.getElementById("quizArea").style.display="none"

}

</script>

</body>
</html>
