<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GATE Practice Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(120deg,#1f4037,#99f2c8);
margin:0;
padding:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:white;
width:95%;
max-width:1100px;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.timer{
font-size:18px;
color:red;
font-weight:bold;
margin-bottom:10px;
}

.layout{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.palette{
width:220px;
max-width:100%;
display:flex;
flex-wrap:wrap;
gap:8px;
}

.qbox{
width:40px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
background:#ccc;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.answered{background:#4CAF50;color:white;}
.review{background:#ff9800;color:white;}
.current{border:3px solid black;}

.correct{background:#4CAF50;color:white;}
.wrong{background:#e53935;color:white;}

.question-area{
flex:1;
min-width:250px;
}

.option{
display:block;
background:#f3f3f3;
padding:12px;
margin:10px 0;
border-radius:6px;
cursor:pointer;
}

.option:hover{
background:#e0e0e0;
}

.buttons{
margin-top:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
background:#1976d2;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#0d47a1;
}

.summary{
display:flex;
gap:20px;
margin-top:15px;
flex-wrap:wrap;
}

.card{
background:#f4f4f4;
padding:15px;
border-radius:8px;
flex:1;
text-align:center;
font-weight:bold;
}

.progress-container{
width:100%;
background:#ddd;
height:25px;
border-radius:12px;
margin-top:15px;
overflow:hidden;
}

.progress-bar{
height:100%;
background:linear-gradient(90deg,#4CAF50,#00c853);
color:white;
text-align:center;
line-height:25px;
font-weight:bold;
}

.review-section{
display:flex;
gap:25px;
margin-top:25px;
flex-wrap:wrap;
}

.explanation{
flex:1;
background:#f7f7f7;
padding:20px;
border-radius:10px;
min-width:250px;
}

.correct-option{
color:green;
font-weight:bold;
}

.wrong-option{
color:red;
font-weight:bold;
}

/* MOBILE RESPONSIVE */

@media(max-width:768px){

body{
padding:10px;
align-items:flex-start;
}

.container{
width:100%;
padding:15px;
}

.layout{
flex-direction:column;
}

.palette{
width:100%;
justify-content:center;
}

.qbox{
width:36px;
height:36px;
font-size:12px;
}

.option{
font-size:14px;
padding:10px;
}

.buttons{
flex-direction:column;
}

button{
width:100%;
}

.summary{
flex-direction:column;
}

.review-section{
flex-direction:column;
}

}

</style>
</head>

<body>

<div class="container">

<h2>Upload Quiz CSV</h2>

<input type="file" id="csvFile">
<button onclick="loadQuiz()">Start Quiz</button>

<div id="quizArea" style="display:none">

<div class="timer" id="timer"></div>

<div class="layout">

<div class="palette" id="palette"></div>

<div class="question-area">

<h3 id="question"></h3>

<div id="options"></div>

<div class="buttons">

<button onclick="prevQuestion()">Previous</button>
<button onclick="markReview()">Mark Review</button>
<button onclick="nextQuestion()">Next</button>
<button onclick="submitQuiz()">Submit</button>

</div>

</div>

</div>

</div>

<div id="result"></div>

</div>

<script>

let quizData=[]
let currentQuestion=0
let answers=[]
let review=[]
let timer
let timeLeft=0

function loadQuiz(){

let file=document.getElementById("csvFile").files[0]

if(!file){
alert("Upload CSV file")
return
}

let reader=new FileReader()

reader.onload=function(e){

let lines=e.target.result.split("\n")

for(let i=1;i<lines.length;i++){

let d=lines[i].split(",")

if(d.length>=6){

quizData.push({
q:d[0],
o:[d[1],d[2],d[3],d[4]],
a:d[5].trim()
})

}

}

startQuiz()

}

reader.readAsText(file)

}

function startQuiz(){

document.getElementById("quizArea").style.display="block"

timeLeft=quizData.length*60

createPalette()

startTimer()

showQuestion()

}

function startTimer(){

timer=setInterval(()=>{

timeLeft--

let m=Math.floor(timeLeft/60)
let s=timeLeft%60

if(s<10) s="0"+s

document.getElementById("timer").innerHTML="Time: "+m+":"+s

if(timeLeft<=0){
clearInterval(timer)
showResult()
}

},1000)

}

function createPalette(){

let html=""

for(let i=0;i<quizData.length;i++){
html+=`<div class="qbox" id="box${i}" onclick="gotoQ(${i})">${i+1}</div>`
}

document.getElementById("palette").innerHTML=html

}

function showQuestion(){

let q=quizData[currentQuestion]

document.getElementById("question").innerHTML="Q"+(currentQuestion+1)+": "+q.q

let html=""

q.o.forEach(opt=>{

let checked=answers[currentQuestion]==opt?"checked":""

html+=`
<label class="option">
<input type="radio" name="opt" value="${opt}" ${checked}>
${opt}
</label>
`

})

document.getElementById("options").innerHTML=html

updatePalette()

}

function saveAnswer(){

let s=document.querySelector('input[name="opt"]:checked')

if(s){
answers[currentQuestion]=s.value
}

}

function nextQuestion(){

saveAnswer()

if(currentQuestion<quizData.length-1){
currentQuestion++
showQuestion()
}

}

function prevQuestion(){

saveAnswer()

if(currentQuestion>0){
currentQuestion--
showQuestion()
}

}

function markReview(){

review[currentQuestion]=true
updatePalette()

}

function gotoQ(i){

saveAnswer()
currentQuestion=i
showQuestion()

}

function updatePalette(){

for(let i=0;i<quizData.length;i++){

let b=document.getElementById("box"+i)

b.classList.remove("answered","review","current")

if(answers[i]) b.classList.add("answered")

if(review[i]) b.classList.add("review")

if(i===currentQuestion) b.classList.add("current")

}

}

function submitQuiz(){

saveAnswer()
clearInterval(timer)
showResult()

}

function showResult(){

document.getElementById("quizArea").style.display="none"

let correct=0

quizData.forEach((q,i)=>{
if(answers[i]===q.a) correct++
})

let wrong=(answers.filter(a=>a).length)-correct
let percent=Math.round((correct/quizData.length)*100)

let html=`

<h2>Exam Summary</h2>

<div class="summary">

<div class="card">Total Questions<br>${quizData.length}</div>
<div class="card">Correct<br>${correct}</div>
<div class="card">Wrong<br>${wrong}</div>

</div>

<div class="progress-container">
<div class="progress-bar" style="width:${percent}%">${percent}%</div>
</div>

<h3>Question Review</h3>

<div class="review-section">

<div class="palette">
`

quizData.forEach((q,i)=>{

let cls="wrong"
if(answers[i]===q.a) cls="correct"

html+=`<div class="qbox ${cls}" onclick="showExplanation(${i})">${i+1}</div>`

})

html+=`

</div>

<div class="explanation" id="explanationBox">
Click a question number to see explanation
</div>

</div>
`

document.getElementById("result").innerHTML=html

}

function showExplanation(i){

let q=quizData[i]

let html=`
<h3>Question ${i+1}</h3>
<p><b>${q.q}</b></p>
<ul>
`

q.o.forEach(opt=>{

let cls=""

if(opt===q.a) cls="correct-option"
else if(opt===answers[i]) cls="wrong-option"

html+=`<li class="${cls}">${opt}</li>`

})

html+=`
</ul>

<p><b>Your Answer:</b> ${answers[i] || "Not Answered"}</p>
<p><b>Correct Answer:</b> ${q.a}</p>
<p><b>Explanation:</b> Add explanation in dataset if needed.</p>
`

document.getElementById("explanationBox").innerHTML=html

}

</script>

</body>
</html>
