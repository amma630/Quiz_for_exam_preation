<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GATE Practice Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(120deg, #1f4037, #99f2c8);
            margin: 0; padding: 10px;
            display: flex; justify-content: center; min-height: 100vh;
        }
        .container {
            background: white;
            width: 100%; /* FIX 2: Responsive width */
            max-width: 800px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-top: 10px;
        }
        .timer { font-size: 20px; color: red; font-weight: bold; text-align: right; margin-bottom: 10px; }
        .layout { display: flex; flex-direction: column; gap: 15px; } /* FIX 3: Stack on mobile */
        @media (min-width: 768px) { .layout { flex-direction: row; } .palette { width: 220px; } }
        .palette { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 8px; background: #f4f4f4; padding: 10px; border-radius: 8px; }
        .qbox { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; background: #ccc; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .answered { background: #4CAF50 !important; color: white; }
        .review { background: #ff9800 !important; color: white; }
        .current { border: 3px solid black; transform: scale(1.05); }
        .correct { background: #4CAF50; color: white; }
        .wrong { background: #e53935; color: white; }
        .question-area { flex: 1; }
        .option {
            display: block; background: #f3f3f3; padding: 16px; margin: 10px 0;
            border-radius: 8px; cursor: pointer; border: 1px solid #ddd;
        }
        .option:active { background: #e0e0e0; }
        .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { background: #1976d2; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; }
        .btn-full { grid-column: span 2; background: #333; }
        .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .card { background: #f4f4f4; padding: 10px; border-radius: 8px; text-align: center; font-size: 12px; font-weight: bold; }
        .explanation { background: #fff9c4; padding: 15px; border-radius: 10px; border-left: 5px solid #fbc02d; margin-top: 15px; }
        .correct-option { color: green; font-weight: bold; }
        .wrong-option { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="uploadScreen">
        <h2 style="margin-top:0">Supernetting Quiz</h2>
        <p>Select your 7-column CSV file:</p>
        <input type="file" id="csvFile" accept=".csv" style="width:100%; margin-bottom:20px;">
        <button onclick="loadQuiz()" style="width:100%">Start Practice</button>
    </div>

    <div id="quizArea" style="display:none">
        <div class="timer" id="timer">Time: 00:00</div>
        <div class="layout">
            <div class="palette" id="palette"></div>
            <div class="question-area">
                <h3 id="question"></h3>
                <div id="options"></div>
                <div class="buttons">
                    <button onclick="prevQuestion()">Previous</button>
                    <button onclick="nextQuestion()">Next</button>
                    <button onclick="markReview()" style="background:#ff9800">Review</button>
                    <button onclick="submitQuiz()" class="btn-full">Submit Final Exam</button>
                </div>
            </div>
        </div>
    </div>

    <div id="result"></div>
</div>

<script>
let quizData = [], currentQuestion = 0, answers = [], review = [], timer, timeLeft = 0;

function loadQuiz() {
    const file = document.getElementById("csvFile").files[0];
    if (!file) return alert("Please select your CSV file.");

    const reader = new FileReader();
    reader.onload = (e) => {
        const rows = e.target.result.split(/\r?\n/).filter(line => line.trim() !== "");
        quizData = rows.slice(1).map(row => {
            // FIX 4: Handle commas inside quotes for explanations
            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            return {
                q: cols[0]?.replace(/"/g, ""),
                o: [cols[1], cols[2], cols[3], cols[4]].map(o => o?.replace(/"/g, "")),
                a: cols[5]?.trim().replace(/"/g, ""),
                e: cols[6]?.replace(/"/g, "") || "No explanation provided."
            };
        }).filter(q => q.q);

        if (quizData.length > 0) {
            document.getElementById("uploadScreen").style.display = "none";
            document.getElementById("quizArea").style.display = "block";
            timeLeft = quizData.length * 60;
            createPalette();
            startTimer();
            showQuestion();
        } else {
            alert("CSV Error: Ensure you have 7 columns (Question to Explanation)");
        }
    };
    reader.readAsText(file);
}

function startTimer() {
    timer = setInterval(() => {
        timeLeft--;
        let m = Math.floor(timeLeft/60), s = timeLeft%60;
        document.getElementById("timer").innerText = `Time: ${m}:${s<10?'0'+s:s}`;
        if(timeLeft <= 0) submitQuiz();
    }, 1000);
}

function createPalette() {
    document.getElementById("palette").innerHTML = quizData.map((_, i) => 
        `<div class="qbox" id="box${i}" onclick="gotoQ(${i})">${i+1}</div>`
    ).join('');
}

function showQuestion() {
    const q = quizData[currentQuestion];
    document.getElementById("question").innerText = `Q${currentQuestion+1}: ${q.q}`;
    document.getElementById("options").innerHTML = q.o.map(opt => `
        <label class="option">
            <input type="radio" name="opt" value="${opt}" ${answers[currentQuestion]===opt?'checked':''} onchange="saveAnswer()"> ${opt}
        </label>
    `).join('');
    updatePalette();
}

function saveAnswer() {
    const s = document.querySelector('input[name="opt"]:checked');
    if (s) { answers[currentQuestion] = s.value; updatePalette(); }
}

function nextQuestion() { if(currentQuestion < quizData.length-1) { currentQuestion++; showQuestion(); } }
function prevQuestion() { if(currentQuestion > 0) { currentQuestion--; showQuestion(); } }
function markReview() { review[currentQuestion] = !review[currentQuestion]; updatePalette(); }
function gotoQ(i) { currentQuestion = i; showQuestion(); }

function updatePalette() {
    quizData.forEach((_, i) => {
        const b = document.getElementById(`box${i}`);
        b.className = `qbox ${answers[i]?'answered':''} ${review[i]?'review':''} ${i===currentQuestion?'current':''}`;
    });
}

function submitQuiz() {
    clearInterval(timer);
    document.getElementById("quizArea").style.display = "none";
    let score = 0;
    quizData.forEach((q, i) => { if(answers[i] === q.a) score++; });
    
    let html = `
        <h2>Exam Summary</h2>
        <div class="summary">
            <div class="card">Total<br>${quizData.length}</div>
            <div class="card">Correct<br>${score}</div>
            <div class="card">Wrong<br>${answers.filter(a=>a).length - score}</div>
        </div>
        <h3>Review Questions</h3>
        <div class="palette" style="margin-bottom:20px;">
            ${quizData.map((q, i) => `<div class="qbox ${answers[i]===q.a?'answered':'wrong'}" onclick="showExpl(${i})">${i+1}</div>`).join('')}
        </div>
        <div id="explBox" class="explanation">Click a number above to see the explanation.</div>
        <button onclick="location.reload()" style="width:100%; margin-top:20px;">Restart Quiz</button>
    `;
    document.getElementById("result").innerHTML = html;
}

function showExpl(i) {
    const q = quizData[i];
    document.getElementById("explBox").innerHTML = `
        <strong>Question ${i+1}</strong><br>${q.q}<br><br>
        <strong>Correct Answer:</strong> <span class="correct-option">${q.a}</span><br>
        <strong>Explanation:</strong> ${q.e}
    `;
}
</script>
</body>
</html>
